<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        pre { background: #f5f5f5; padding: 15px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Supabase 题库连接测试</h1>
    <div id="status"></div>
    <div id="results"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_CONFIG = {
            url: 'https://afuesynrviwicnjisuma.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmdWVzeW5ydml3aWNuamlzdW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDkyNzIsImV4cCI6MjA5MTQ4NTI3Mn0.Ca_zhP03FkZiVvchStzgZuIRf-PFa1Alq-HZszKMxYw'

        async function testConnection() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');

            try {
                // 初始化 Supabase
                const supabase = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
                statusDiv.innerHTML = '<div class="status success">✅ Supabase 客户端初始化成功</div>';

                // 测试连接 - 获取题目总数
                statusDiv.innerHTML += '<div class="status info">🔄 正在查询数据库...</div>';

                const { count, error: countError } = await supabase
                    .from('questions')
                    .select('*', { count: 'exact', head: true });

                if (countError) throw countError;

                statusDiv.innerHTML += `<div class="status success">✅ 数据库连接成功，题目总数：${count}</div>`;

                // 测试读取题目
                const { data, error } = await supabase
                    .from('questions')
                    .select('*')
                    .eq('is_active', true)
                    .limit(5);

                if (error) throw error;

                let html = '<h3>随机 5 道题目预览：</h3>';
                data.forEach((q, i) => {
                    html += `
<div style="border: 1px solid #ddd; padding: 10px; margin: 10px 0;">
    <strong>${i + 1}. [${q.code}]</strong> ${q.question}<br>
    <small>分类：${q.category} | 难度：${q.difficulty}</small>
</div>`;
                });

                // 按分类统计
                const { data: stats } = await supabase
                    .from('questions')
                    .select('category, count', { count: 'exact' });

                html += '<h3>分类统计：</h3><pre>';
                const categoryCount = {};
                data.forEach(q => {
                    // 这只是示例，实际统计需要另外查询
                });
                html += '查询成功！请查看主应用进行测试。';
                html += '</pre>';

                resultsDiv.innerHTML = html;

                statusDiv.innerHTML += '<div class="status success">✅ 所有测试通过！题库已就绪。</div>';

            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ 测试失败：${error.message}</div>`;
                console.error('Test failed:', error);
            }
        }

        // 页面加载时执行测试
        testConnection();
    </script>
</body>
</html>
